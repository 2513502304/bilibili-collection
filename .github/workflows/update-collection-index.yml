name: Update collection index

on:
  schedule:
    # 每天 02:00（Asia/Shanghai）运行；脚本统计北京时间昨天及往前 7 天。
    - cron: "0 2 * * *"
      timezone: "Asia/Shanghai"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-collection-index
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Update README collection index
        run: python scripts/update_collection_index.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md data/collection_index.json
          if git diff --cached --quiet; then
            echo "No collection index changes to commit."
          else
            git commit -m "docs: update collection index"
            git push
          fi
